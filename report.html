<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Security Report</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at center, #020617, #000);
    overflow: hidden;
}

/* GRID BACKGROUND */
.grid {
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(#00f0ff22 1px, transparent 1px),
                linear-gradient(90deg, #00f0ff22 1px, transparent 1px);
    background-size: 50px 50px;
    transform: rotateX(60deg);
    animation: gridMove 10s linear infinite;
}

@keyframes gridMove {
    from { transform: rotateX(60deg) translateY(0); }
    to { transform: rotateX(60deg) translateY(50px); }
}

/* CENTER CARD */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(10, 20, 50, 0.9);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 30px #00f0ff;
    width: 400px;
}

/* TITLE */
.title {
    font-size: 28px;
    color: #00f0ff;
    margin-bottom: 20px;
}

/* DATA */
.data {
    font-size: 18px;
    margin: 10px 0;
}

/* BUTTON */
.back-btn {
    margin-top: 20px;
    padding: 10px 25px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(90deg, #00f0ff, #0077ff);
    color: rgb(255, 255, 255);
    cursor: pointer;
    transition: 0.3s;
}

.back-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #00f0ff;
}

/* PARTICLES */
.particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #00f0ff;
    animation: move 10s linear infinite;
}

@keyframes move {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="grid"></div>

<div class="card">

    <div class="title">AI SECURITY REPORT</div>

    <div class="data">Total Logs: {{ total_logs }}</div>
    <div class="data">Threats Detected: {{ total_alerts }}</div>
    <div class="data">Threat Percentage: {{ threat_percentage }}%</div>

    <a href="/dashboard">
        <button class="back-btn">Back</button>
    </a>

</div>

<script>
// PARTICLES
for (let i = 0; i < 120; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (Math.random() * 5 + 5) + "s";
    document.body.appendChild(p);
}
</script>

</body>
</html>
