<<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IntrusionX Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Orbitron', sans-serif;
}

body {
    height: 100vh;
    background: radial-gradient(circle at center, #020617, #000);
    overflow: hidden;
}

/* BACKGROUND GRID */
.grid {
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(#00f0ff22 1px, transparent 1px),
                linear-gradient(90deg, #00f0ff22 1px, transparent 1px);
    background-size: 50px 50px;
    transform: rotateX(60deg);
    animation: gridMove 8s linear infinite;
    z-index: 0;
}

@keyframes gridMove {
    from { transform: rotateX(60deg) translateY(0); }
    to { transform: rotateX(60deg) translateY(50px); }
}

/* LOCK ICON */
.lock {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 120px;
    height: 140px;
    z-index: 2;
    animation: lockEntry 2s ease-out forwards;
}

/* LOCK BODY */
.lock-body {
    width: 100%;
    height: 80px;
    background: linear-gradient(#00f0ff, #0077ff);
    border-radius: 10px;
}

/* LOCK TOP */
.lock-top {
    width: 70px;
    height: 60px;
    border: 6px solid #00f0ff;
    border-bottom: none;
    border-radius: 40px 40px 0 0;
    margin: auto;
}

/* LOCK ENTRY */
@keyframes lockEntry {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
}

/* LOCK PULSE */
.lock::after {
    content: '';
    position: absolute;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, #00f0ff55, transparent 70%);
    top: -30px;
    left: -40px;
    border-radius: 50%;
    animation: pulse 3s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.5); opacity: 1; }
    100% { transform: scale(1); opacity: 0.5; }
}

/* TITLE */
.title {
    position: absolute;
    top: 20%;
    width: 100%;
    text-align: center;
    font-size: 60px;
    color: #00f0ff;
    text-shadow: 0 0 20px #00f0ff, 0 0 60px #00f0ff;
    z-index: 3;
    animation: float 4s infinite ease-in-out;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-25px); }
}

/* BUTTON */
.enter-btn {
    position: absolute;
    top: 70%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 15px 45px;
    border: none;
    border-radius: 40px;
    background: linear-gradient(90deg, #00f0ff, #0077ff);
    color: black;
    font-weight: bold;
    cursor: pointer;
    z-index: 3;
    transition: 0.3s;
}

.enter-btn:hover {
    transform: translate(-50%, -50%) scale(1.2);
    box-shadow: 0 0 30px #00f0ff;
}

/* PARTICLES */
.particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #00f0ff;
    animation: move 10s linear infinite;
    z-index: 1;
}

@keyframes move {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="grid"></div>

<div class="title">G3 AI IDS</div>

<div class="lock">
    <div class="lock-top"></div>
    <div class="lock-body"></div>
</div>

<a href="/login">
    <button class="enter-btn">ENTER SYSTEM</button>
</a>

<script>
// PARTICLES
for (let i = 0; i < 120; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (Math.random() * 5 + 5) + "s";
    document.body.appendChild(p);
}
</script>

</body>
</html>
